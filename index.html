<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CAPITALISM - Void Platform</title>
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* --- 変数定義 --- */
        :root {
            --bg-color: #050508;
            --text-color: #ffffff;
            --accent-color: #8a2be2;
            --accent-glow: rgba(138, 43, 226, 0.5);
            --sub-text: #aaa;
            --card-bg: rgba(15, 15, 25, 0.9);
            --nav-bg: rgba(0, 0, 0, 0.8);
            --rank-bg: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --text-color: #1a1a1a;
            --accent-color: #4b0082;
            --accent-glow: rgba(75, 0, 130, 0.3);
            --sub-text: #555;
            --card-bg: rgba(255, 255, 255, 0.95);
            --nav-bg: rgba(255, 255, 255, 0.9);
            --rank-bg: rgba(0, 0, 0, 0.05);
        }

        /* --- Advanced Background Decor --- */
        body { 
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            background: var(--bg-color); color: var(--text-color); text-align: center; 
            padding: 0; margin: 0; overflow-x: hidden; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            touch-action: manipulation;
            position: relative;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, var(--accent-glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, var(--accent-glow) 0%, transparent 40%);
            z-index: -2; opacity: 0.4; pointer-events: none;
        }

        .bg-overlay {
            position: fixed; inset: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 1000; pointer-events: none; opacity: 0.3;
        }

        .particles {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute; background: var(--accent-color);
            border-radius: 2px; opacity: 0.15; filter: blur(1px);
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- Layout --- */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px; width: 95%; max-width: 1400px;
            margin: auto; padding-top: 150px;
            position: relative; z-index: 2;
        }
        .main-layout.full-width { grid-template-columns: 1fr; }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr !important; padding-top: 130px; }
            .sidebar { order: 2; margin-bottom: 50px; }
            .container { order: 1; }
        }

        .container { position: relative; padding-bottom: 40px; width: 100%; }

        /* --- Navigation (Modified for Top_banner.png) --- */
        .top-nav-fantasy {
            position: fixed; top: 0; left: 0; width: 100%; height: 120px;
            display: flex; justify-content: flex-start; align-items: center;
            z-index: 1001; 
            background: url('Top_banner.png') no-repeat center;
            background-size: cover;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .nav-container-fantasy { 
            position: relative; width: 100%; height: 100%; 
            display: flex; align-items: center; padding-left: 40px; 
        }
        .nav-links-fantasy { 
            display: flex; gap: 20px; align-items: center; 
        }
        .nav-item-fantasy { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid var(--accent-color); 
            color: #ffd700; 
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            text-shadow: 1px 1px 2px #000;
            backdrop-filter: blur(4px);
        }
        .nav-item-fantasy:hover {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .theme-switch {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: var(--card-bg); border: 1px solid var(--accent-color);
            color: var(--text-color); padding: 8px; border-radius: 50px; cursor: pointer;
            z-index: 1002; font-size: 18px; box-shadow: 0 0 10px var(--accent-color);
        }

        /* --- Ranking Sidebar --- */
        .sidebar { padding-top: 20px; z-index: 5; }
        .ranking-board {
            background: var(--rank-bg); border: 1px solid var(--accent-color);
            border-radius: 15px; padding: 20px; text-align: left;
            backdrop-filter: blur(10px); box-shadow: inset 0 0 20px rgba(138, 43, 226, 0.1);
        }
        .rank-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 0;
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
        }
        .rank-num { font-weight: bold; color: var(--accent-color); width: 25px; }
        .rank-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent-color); }
        .rank-name { flex-grow: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-money { color: #00ffcc; font-weight: bold; font-size: 14px; }

        /* --- Character Mascot --- */
        .character-box {
            position: fixed; bottom: -20px; right: 20px; z-index: 100;
            pointer-events: none; transition: 0.5s;
        }
        .mascot-img {
            width: 280px; filter: drop-shadow(0 0 15px var(--accent-color));
            animation: floating 4s ease-in-out infinite;
            pointer-events: auto;
        }
        .chat-bubble {
            background: white; color: black; padding: 10px 20px;
            border-radius: 20px; position: absolute; top: -40px; left: -20px;
            font-size: 12px; font-weight: bold; white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0; transition: 0.3s;
        }
        .character-box:hover .chat-bubble { opacity: 1; transform: translateY(-10px); }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- Banner Slider --- */
        .ad-section {
            width: 100%; max-width: 1400px; 
            margin: 100px auto 150px; padding: 0;
            overflow: hidden; position: relative; z-index: 2;
        }
        .banner-track {
            display: flex; width: calc(450px * 10);
            animation: scroll-loop 40s linear infinite;
        }
        .banner-slide { width: 450px; flex-shrink: 0; padding: 0 20px; box-sizing: border-box; }
        .banner-img {
            width: 100%; height: auto; border-radius: 15px;
            border: 2px solid rgba(138, 43, 226, 0.4);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
        }
        .banner-img:hover { transform: scale(1.08); border-color: var(--accent-color); box-shadow: 0 0 30px var(--accent-color); }

        @keyframes scroll-loop {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-450px * 5)); }
        }

        /* --- Shop Card --- */
        .card-container { height: 550px; perspective: 2000px; display: flex; justify-content: center; align-items: center; }
        #shop-items { width: 300px; height: 420px; transform-style: preserve-3d; transition: transform 0.1s; cursor: grab; }
        .card { 
            position: absolute; inset: 0; background: var(--card-bg); 
            border: 2px solid var(--accent-color); padding: 30px 20px; 
            backface-visibility: hidden; display: flex; flex-direction: column; 
            justify-content: space-between; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-size: cover; background-position: center;
        }
        .card::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
            border-radius: 18px; z-index: 1;
        }
        .card > * { position: relative; z-index: 2; }

        /* --- UI Elements --- */
        h1 { font-size: clamp(2rem, 8vw, 3.5rem); letter-spacing: 10px; margin: 20px 0; background: linear-gradient(to bottom, var(--text-color) 20%, var(--accent-color) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--accent-glow)); }

        .status-card { width: 90%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--accent-color); padding: 40px; margin: auto; border-radius: 20px; backdrop-filter: blur(10px); }
        .prof-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent-color); margin-bottom: 20px; }
        .money-display { font-size: 38px; color: #00ffcc; font-weight: bold; }

        #auth-modal, #gacha-reveal-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.5s; }
        #auth-modal.active, #gacha-reveal-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-color); border: 2px solid var(--accent-color); padding: 30px; width: 80%; max-width: 320px; color: var(--text-color); border-radius: 15px; box-shadow: 0 0 30px var(--accent-glow); }
        .modal-input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: #fff; text-align: center; font-size: 20px; margin: 20px 0; box-sizing: border-box; }

        .hidden { display: none !important; }
        .main-shop-btn { background: #000; color: #fff; border: 1px solid var(--accent-color); padding: 15px 30px; cursor: pointer; transition: 0.3s; border-radius: 5px; font-weight: bold; }
        .main-shop-btn:hover { background: var(--accent-color); box-shadow: 0 0 20px var(--accent-color); }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="particles" id="particle-container"></div>

    <nav class="top-nav-fantasy">
        <div class="nav-container-fantasy">
            <div class="nav-links-fantasy">
                <button class="nav-item-fantasy" onclick="showPage('menu-page')">HOME</button>
                <button class="nav-item-fantasy" onclick="showPage('shop-page')">SHOP</button>
                <button class="nav-item-fantasy" onclick="showPage('gacha-menu-page')">GACHA</button>
                <button class="nav-item-fantasy" onclick="openProfileAuth()">IDENTITY</button>
            </div>
        </div>
        <button class="theme-switch" onclick="toggleTheme()">🌙</button>
    </nav>

    <div class="main-layout" id="main-layout-container">
        <main class="container">
            <div id="menu-page">
                <h1>CAPITALISM</h1>
                <p style="color: var(--sub-text); letter-spacing: 5px;">VOID PROTOCOL // 2.0.2.6</p>
                <div style="margin-top: 50px;">
                    <button class="main-shop-btn" onclick="showPage('shop-page')">ENTER SHOP</button>
                </div>
            </div>

            <div id="shop-page" class="hidden">
                <h1>ROLL SHOP</h1>
                <p style="font-size:12px; color:var(--accent-color);">DRAG OR SWIPE TO ROTATE</p>
                <div class="card-container"><div id="shop-items"></div></div>
            </div>

            <div id="gacha-menu-page" class="hidden">
                <h1>GACHA SYSTEM</h1>
                <div id="gacha-types-container" style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top:30px;"></div>
            </div>

            <div id="profile-page" class="hidden">
                <h1>STATUS</h1>
                <div class="status-card">
                    <img id="prof-avatar" src="" class="prof-avatar">
                    <h2 id="prof-name">???</h2>
                    <div class="money-display" id="prof-money">0</div>
                    <div style="display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
                        <div><small>SUBS</small><div id="prof-subs">0</div></div>
                        <div><small>RANK</small><div id="prof-rank-val">---</div></div>
                    </div>
                    <button class="main-shop-btn" style="margin-top:20px; width:100%;" onclick="showPage('menu-page')">BACK</button>
                </div>
            </div>
        </main>

        <aside class="sidebar" id="main-sidebar">
            <div class="ranking-board">
                <h3 style="margin-top: 0; color: var(--accent-color); border-bottom: 1px solid var(--accent-color);">TOP HOLDERS</h3>
                <div id="ranking-list">
                    <p style="font-size: 12px; color: var(--sub-text);">Loading ranking...</p>
                </div>
            </div>
        </aside>
    </div>

    <section class="ad-section">
        <div class="banner-track">
            <div class="banner-slide"><img src="banner1.png" class="banner-img" onerror="this.src='https://via.placeholder.com/450x200?text=VOID+AD+1'"></div>
            <div class="banner-slide"><img src="banner2.png" class="banner-img" onerror="this.src='https://via.placeholder.com/450x200?text=VOID+AD+2'"></div>
            <div class="banner-slide"><img src="banner3.png" class="banner-img" onerror="this.src='https://via.placeholder.com/450x200?text=VOID+AD+3'"></div>
            <div class="banner-slide"><img src="banner4.png" class="banner-img" onerror="this.src='https://via.placeholder.com/450x200?text=VOID+AD+4'"></div>
            <div class="banner-slide"><img src="banner5.png" class="banner-img" onerror="this.src='https://via.placeholder.com/450x200?text=VOID+AD+5'"></div>
            <div class="banner-slide"><img src="banner1.png" class="banner-img" onerror="this.style.display='none'"></div>
            <div class="banner-slide"><img src="banner2.png" class="banner-img" onerror="this.style.display='none'"></div>
            <div class="banner-slide"><img src="banner3.png" class="banner-img" onerror="this.style.display='none'"></div>
            <div class="banner-slide"><img src="banner4.png" class="banner-img" onerror="this.style.display='none'"></div>
            <div class="banner-slide"><img src="banner5.png" class="banner-img" onerror="this.style.display='none'"></div>
        </div>
        <p style="font-size: 10px; color: var(--sub-text); margin: 20px 0 100px; letter-spacing: 2px;">SECURED BY VOID CORP</p>
    </section>

    <div class="character-box">
        <div class="chat-bubble" id="char-quote">いらっしゃいませ...</div>
        <img src="character.png" class="mascot-img" onerror="this.src='https://via.placeholder.com/280x400?text=No+Character'">
    </div>

    <div id="auth-modal">
        <div class="modal-content">
            <h2 id="modal-title">AUTHORIZE</h2>
            <input type="password" id="password-input" class="modal-input" placeholder="••••">
            <div style="display: flex; gap: 10px;">
                <button onclick="closeModal()" style="flex:1; border: 1px solid #444; background:none; color:#fff; cursor:pointer;">ABORT</button>
                <button id="modal-confirm-btn" style="flex:1; background: var(--accent-color); border:none; color:#fff; cursor:pointer; font-weight:bold;">EXECUTE</button>
            </div>
        </div>
    </div>

    <div id="gacha-reveal-modal">
        <div id="chest-container">
            <img id="chest-img" src="closed_chest.png" style="width:200px; cursor:pointer;" onclick="revealGachaResult()">
            <p style="color:gold; letter-spacing:3px;">TAP TO UNSEAL</p>
        </div>
        <div id="gacha-result-area" class="hidden">
            <div id="result-card-box">
                <h2 id="result-series" style="color: gold; margin: 0; font-size: 14px; letter-spacing: 2px;"></h2>
                <h1 id="result-name" style="margin: 10px 0; font-size: 28px; color: #fff;"></h1>
                <p style="font-size: 12px; color: #00ffcc;">UNSEALED SUCCESSFUL</p>
            </div>
            <button class="main-shop-btn" onclick="closeGachaReveal()">CLOSE</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        // パーティクル生成
        function createParticles() {
            const container = document.getElementById('particle-container');
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        const firebaseConfig = { databaseURL: "https://mybot-4e6b1-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let GACHA_PRICES = { 'normal': 10000, 'limited_time': 30000, 'limited_stock': 50000 };
        let sessionPassword = "", currentItem = null, rotationY = 0, isDragging = false, startX = 0, gachaResult = null;

        database.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.SHOP_DATA = data.SHOP_DATA || [];
                window.GACHA_DATA = data.GACHA_DATA || [];
                window.USER_PROFILES = data.USER_PROFILES || {};
                updateRanking(window.USER_PROFILES);
                if (!document.getElementById('profile-page').classList.contains('hidden') && sessionPassword) {
                    updateProfileDisplay(sessionPassword);
                }
            }
        });

        function updateRanking(profiles) {
            const list = document.getElementById('ranking-list');
            list.innerHTML = "";
            const sorted = Object.entries(profiles).sort(([,a], [,b]) => b.money - a.money).slice(0, 8);
            sorted.forEach(([pwd, u], i) => {
                const item = document.createElement('div');
                item.className = 'rank-item';
                item.innerHTML = `<span class="rank-num">${i+1}</span><img src="${u.avatar}" class="rank-avatar" onerror="this.src='https://discord.com/assets/f78426a064bc98b57351.png'"><span class="rank-name">${u.name}</span><span class="rank-money">${Number(u.money).toLocaleString()}</span>`;
                list.appendChild(item);
            });
        }

        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.querySelector('.theme-switch');
            if (body.getAttribute('data-theme') === 'light') { body.removeAttribute('data-theme'); btn.innerText = '🌙'; }
            else { body.setAttribute('data-theme', 'light'); btn.innerText = '☀️'; }
        }

        function showPage(id) {
            document.querySelectorAll('main > div').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const layout = document.getElementById('main-layout-container');
            const sidebar = document.getElementById('main-sidebar');
            if (id === 'menu-page') { layout.classList.remove('full-width'); sidebar.classList.remove('hidden'); }
            else { layout.classList.add('full-width'); sidebar.classList.add('hidden'); }
            if(id === 'shop-page') renderShop();
            if(id === 'gacha-menu-page') renderGachaMenu();
            window.scrollTo(0,0);
        }

        function renderShop() {
            const container = document.getElementById('shop-items');
            container.innerHTML = ""; 
            if (!window.SHOP_DATA || !window.SHOP_DATA.length) return;
            const step = 360 / SHOP_DATA.length;
            const r = Math.max(400, 180 / Math.tan(Math.PI / SHOP_DATA.length));
            SHOP_DATA.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundImage = "url('shop_card.png')";
                card.style.transform = `rotateY(${i * step}deg) translateZ(${r}px)`;
                card.innerHTML = `<h3>${item.name}</h3><p>${item.desc}</p><div class="money-display" style="font-size:24px;">${item.price.toLocaleString()}</div><button class="main-shop-btn" onclick="openBuyModal('${item.name}', ${item.price}, '${item.id}')">BUY NOW</button>`;
                container.appendChild(card);
            });
            setupRotation();
        }

        function setupRotation() {
            const el = document.getElementById('shop-items');
            const cardContainer = document.querySelector('.card-container');
            cardContainer.onmousedown = (e) => { isDragging = true; startX = e.pageX; };
            cardContainer.ontouchstart = (e) => { isDragging = true; startX = e.touches[0].pageX; };
            window.onmousemove = (e) => {
                if (!isDragging) return;
                const delta = (e.pageX - startX) * 0.5;
                rotationY += delta;
                el.style.transform = `rotateY(${rotationY}deg)`;
                startX = e.pageX;
            };
            window.ontouchmove = (e) => {
                if (!isDragging) return;
                const delta = (e.touches[0].pageX - startX) * 0.5;
                rotationY += delta;
                el.style.transform = `rotateY(${rotationY}deg)`;
                startX = e.touches[0].pageX;
            };
            window.onmouseup = window.ontouchend = () => { isDragging = false; };
        }

        function renderGachaMenu() {
            const container = document.getElementById('gacha-types-container');
            container.innerHTML = "";
            const types = [{ id: 'normal', name: '通常召喚' }, { id: 'limited_time', name: '期間限定' }, { id: 'limited_stock', name: '数量限定' }];
            types.forEach(t => {
                const btn = document.createElement('button'); btn.className = 'main-shop-btn';
                btn.style.width = "280px";
                btn.innerHTML = `${t.name}<br><small>${GACHA_PRICES[t.id].toLocaleString()} Credits</small>`;
                btn.onclick = () => openGachaAuth(t.id, GACHA_PRICES[t.id]);
                container.appendChild(btn);
            });
        }

        function openGachaAuth(type, price) {
            const pool = GACHA_DATA.filter(i => i.type === type && (i.stock === -1 || i.stock > 0));
            if (!pool.length) return alert("EMPTY.");
            document.getElementById('modal-confirm-btn').onclick = async () => { 
                const pwd = document.getElementById('password-input').value;
                sessionPassword = pwd;
                gachaResult = pool[Math.floor(Math.random() * pool.length)];
                currentItem = { name: "ガチャ召喚", price: price, id: gachaResult.id };
                closeModal();
                await executeOrderSilent(pwd);
                startGachaAnimation();
            };
            showModal();
        }

        function startGachaAnimation() {
            document.getElementById('gacha-reveal-modal').classList.add('active');
            document.getElementById('chest-container').classList.remove('hidden');
            document.getElementById('gacha-result-area').classList.add('hidden');
        }

        function revealGachaResult() {
            document.getElementById('chest-container').classList.add('hidden');
            document.getElementById('gacha-result-area').classList.remove('hidden');
            const resultBox = document.getElementById('result-card-box');
            resultBox.style.backgroundImage = "url('gacha_card.png')";
            document.getElementById('result-series').innerText = gachaResult.series;
            document.getElementById('result-name').innerText = gachaResult.name;
        }

        function closeGachaReveal() { document.getElementById('gacha-reveal-modal').classList.remove('active'); showPage('menu-page'); }
        function showModal() { document.getElementById('password-input').value = sessionPassword; document.getElementById('auth-modal').classList.add('active'); }
        function closeModal() { document.getElementById('auth-modal').classList.remove('active'); }

        function openBuyModal(name, price, id) {
            currentItem = { name, price, id };
            document.getElementById('modal-confirm-btn').onclick = async () => { 
                const pwd = document.getElementById('password-input').value;
                if(pwd) { sessionPassword = pwd; await executeOrderSilent(pwd); }
                closeModal(); 
            };
            showModal();
        }

        function openProfileAuth() {
            document.getElementById('modal-confirm-btn').onclick = () => {
                const pwd = document.getElementById('password-input').value;
                if (window.USER_PROFILES && window.USER_PROFILES[pwd]) {
                    sessionPassword = pwd; closeModal();
                    updateProfileDisplay(pwd); showPage('profile-page');
                } else { alert("ACCESS DENIED: USER NOT FOUND"); }
            };
            showModal();
        }

        function updateProfileDisplay(pwd) {
            const u = USER_PROFILES[pwd];
            document.getElementById('prof-avatar').src = u.avatar;
            document.getElementById('prof-name').innerText = u.name;
            document.getElementById('prof-money').innerText = Number(u.money).toLocaleString();
            document.getElementById('prof-subs').innerText = u.subs_count;
        }

        async function executeOrderSilent(password) {
            const url = (typeof CONFIG !== 'undefined') ? CONFIG.webhookUrl : "";
            if (!url) return;
            await fetch(url, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: `!pay_req ${password} ${currentItem.id} ${currentItem.price} ${currentItem.name}` })
            });
        }
    </script>
</body>
</html>
